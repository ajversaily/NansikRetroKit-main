<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nansik Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body { background: #111; color: #f5f5f5; font-family: 'Courier New', monospace; }
    .card { background: #1a1a1a; border: 1px solid #333; }
    input, textarea, select { background: #222; border: 1px solid #444; color: #f5f5f5; }
    input:focus, textarea:focus { outline: none; border-color: #888; }
    .btn-primary { background: #f5f5f5; color: #111; font-weight: 700; }
    .btn-primary:hover { background: #ddd; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #e74c3c; }
    .btn-edit { background: #2c3e50; color: #fff; }
    .btn-edit:hover { background: #34495e; }
    #loginScreen { display: flex; }
    #adminPanel { display: none; }
    .drop-zone { border: 2px dashed #444; border-radius: 0.5rem; transition: border-color 0.2s, background 0.2s; cursor: pointer; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #aaa; background: #1f1f1f; }
    .drop-zone.uploaded { border-color: #4ade80; border-style: solid; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Login Screen -->
  <div id="loginScreen" class="min-h-screen items-center justify-center">
    <div class="card rounded-xl p-10 w-full max-w-sm text-center">
      <h1 class="text-2xl font-bold mb-1 tracking-widest uppercase">NANSIK</h1>
      <p class="text-gray-500 text-sm mb-8">Admin Portal</p>
      <input
        id="passwordInput"
        type="password"
        placeholder="Enter password"
        class="w-full px-4 py-3 rounded mb-4 text-center tracking-widest"
        onkeydown="if(event.key==='Enter') login()"
      />
      <button onclick="login()" class="btn-primary w-full py-3 rounded uppercase tracking-widest text-sm">
        Enter
      </button>
      <p id="loginError" class="text-red-400 text-sm mt-4 hidden">Wrong password.</p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="max-w-5xl mx-auto px-6 py-10">

    <div class="flex items-center justify-between mb-10">
      <div>
        <h1 class="text-3xl font-bold tracking-widest uppercase">NANSIK Admin</h1>
        <p class="text-gray-500 text-sm mt-1">Manage your products</p>
      </div>
      <button onclick="logout()" class="text-gray-500 hover:text-white text-sm underline">Logout</button>
    </div>

    <!-- Add / Edit Product Form -->
    <div class="card rounded-xl p-8 mb-10">
      <h2 id="formTitle" class="text-lg font-bold uppercase tracking-widest mb-6">Add New Product</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">Product ID <span class="text-red-400">*</span></label>
          <input id="f_id" type="text" placeholder="e.g. brazil-jersey" class="w-full px-4 py-2 rounded text-sm" />
          <p class="text-xs text-gray-600 mt-1">Lowercase letters and hyphens only. Cannot change after saving.</p>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">Product Name <span class="text-red-400">*</span></label>
          <input id="f_name" type="text" placeholder="e.g. Brazil 98-99 X R9" class="w-full px-4 py-2 rounded text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">Price (USD) <span class="text-red-400">*</span></label>
          <input id="f_price" type="number" step="0.01" min="0" placeholder="e.g. 34.99" class="w-full px-4 py-2 rounded text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">Description</label>
          <input id="f_description" type="text" placeholder="e.g. Iconic Retro Jersey" class="w-full px-4 py-2 rounded text-sm" />
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs text-gray-400 mb-2 uppercase tracking-wider">Main Image</label>
          <!-- Drop zone -->
          <div
            id="dropZone"
            class="drop-zone p-6 text-center mb-3"
            onclick="document.getElementById('fileInput').click()"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)"
          >
            <input id="fileInput" type="file" accept="image/*" class="hidden" onchange="handleFileSelect(event)" />
            <div id="dropZoneContent">
              <p class="text-gray-400 text-sm">Drop image here or <span class="underline cursor-pointer">click to browse</span></p>
              <p class="text-gray-600 text-xs mt-1">JPG, PNG, WebP — max 5 MB</p>
            </div>
            <div id="uploadProgress" class="hidden">
              <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                <div id="uploadBar" class="bg-white h-1.5 rounded-full transition-all" style="width:0%"></div>
              </div>
              <p class="text-gray-400 text-xs mt-2">Uploading...</p>
            </div>
          </div>
          <!-- URL field (auto-filled after upload, or type manually) -->
          <input id="f_image" type="text" placeholder="URL auto-fills after upload — or paste one manually" class="w-full px-4 py-2 rounded text-sm" oninput="updateImagePreview()" />
          <img id="imagePreview" src="" alt="preview" class="hidden mt-3 w-24 h-24 object-cover rounded border border-gray-700" />
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">Extra Image URLs <span class="text-gray-600">(one per line)</span></label>
          <textarea id="f_images" rows="3" placeholder="https://image1.jpg&#10;https://image2.jpg" class="w-full px-4 py-2 rounded text-sm resize-none"></textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button onclick="saveProduct()" class="btn-primary px-8 py-3 rounded uppercase tracking-widest text-sm">
          Save Product
        </button>
        <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-gray-500 hover:text-white text-sm underline self-center">
          Cancel edit
        </button>
      </div>
      <p id="formMsg" class="text-sm mt-4 hidden"></p>
    </div>

    <!-- Product List -->
    <div>
      <h2 class="text-lg font-bold uppercase tracking-widest mb-4">All Products</h2>
      <p id="listMsg" class="text-gray-500 text-sm mb-4"></p>
      <div id="productList" class="space-y-3"></div>
    </div>

  </div>

  <script>
    const ADMIN_PASS_KEY = "nansik_admin_pass";
    let currentPassword = "";
    let editingId = null;

    // ── Auth ────────────────────────────────────────────────────────────────────

    function login() {
      const val = document.getElementById("passwordInput").value.trim();
      if (!val) return;
      // Verify against the server
      fetch("/api/admin-products", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-admin-password": val },
        body: JSON.stringify({ id: "__ping__", name: "__ping__", price: 0 })
      }).then(async r => {
        if (r.status === 401) {
          document.getElementById("loginError").classList.remove("hidden");
          return;
        }
        // 400 = wrong body but auth passed — that's fine for a ping
        currentPassword = val;
        sessionStorage.setItem(ADMIN_PASS_KEY, val);
        showPanel();
        loadProducts();
      }).catch(() => {
        document.getElementById("loginError").classList.remove("hidden");
      });
    }

    function logout() {
      sessionStorage.removeItem(ADMIN_PASS_KEY);
      currentPassword = "";
      _supabaseClient = null;
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("passwordInput").value = "";
    }

    function showPanel() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
    }

    // Auto-login if session still active
    window.addEventListener("DOMContentLoaded", () => {
      const saved = sessionStorage.getItem(ADMIN_PASS_KEY);
      if (saved) {
        currentPassword = saved;
        showPanel();
        loadProducts();
      }
    });

    // ── Load Products ───────────────────────────────────────────────────────────

    async function loadProducts() {
      document.getElementById("listMsg").textContent = "Loading...";
      document.getElementById("productList").innerHTML = "";

      const res = await fetch("/api/products");
      if (!res.ok) {
        document.getElementById("listMsg").textContent = "Could not load products.";
        return;
      }

      const products = await res.json();
      if (!Array.isArray(products)) {
        document.getElementById("listMsg").textContent = "Error: " + (products.error || JSON.stringify(products));
        return;
      }
      document.getElementById("listMsg").textContent = "";

      if (!products.length) {
        document.getElementById("listMsg").textContent = "No products yet. Add your first one above.";
        return;
      }

      const list = document.getElementById("productList");
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "card rounded-xl p-5 flex items-center gap-5";
        card.innerHTML = `
          ${p.image ? `<img src="${escHtml(p.image)}" alt="${escHtml(p.name)}" class="w-16 h-16 object-cover rounded flex-shrink-0" onerror="this.style.display='none'">` : '<div class="w-16 h-16 bg-gray-800 rounded flex-shrink-0"></div>'}
          <div class="flex-1 min-w-0">
            <p class="font-bold truncate">${escHtml(p.name)}</p>
            <p class="text-sm text-gray-400">$${Number(p.price).toFixed(2)} · <span class="font-mono text-xs">${escHtml(p.id)}</span></p>
            <p class="text-xs text-gray-600 truncate">${escHtml(p.description || "")}</p>
          </div>
          <div class="flex gap-2 flex-shrink-0">
            <a href="/product.html?id=${escHtml(p.id)}" target="_blank" class="btn-edit px-4 py-2 rounded text-xs uppercase tracking-wider flex items-center gap-1" style="text-decoration:none;">View ↗</a>
            <button onclick='editProduct(${JSON.stringify(p)})' class="btn-edit px-4 py-2 rounded text-xs uppercase tracking-wider">Edit</button>
            <button onclick="deleteProduct('${escHtml(p.id)}', '${escHtml(p.name)}')" class="btn-danger px-4 py-2 rounded text-xs uppercase tracking-wider">Delete</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // ── Save ────────────────────────────────────────────────────────────────────

    async function saveProduct() {
      const id       = document.getElementById("f_id").value.trim();
      const name     = document.getElementById("f_name").value.trim();
      const price    = document.getElementById("f_price").value.trim();
      const desc     = document.getElementById("f_description").value.trim();
      const image    = document.getElementById("f_image").value.trim();
      const extraRaw = document.getElementById("f_images").value.trim();

      if (!id || !name || !price) {
        showFormMsg("ID, name, and price are required.", "red");
        return;
      }
      if (!/^[a-z0-9-]+$/.test(id)) {
        showFormMsg("ID must be lowercase letters, numbers, and hyphens only.", "red");
        return;
      }

      const images = [image, ...extraRaw.split("\n").map(s => s.trim())].filter(Boolean);

      const res = await fetch("/api/admin-products", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-admin-password": currentPassword },
        body: JSON.stringify({ id, name, price, description: desc, image, images })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showFormMsg(err.error || "Could not save product.", "red");
        return;
      }

      showFormMsg("Product saved!", "green");
      clearForm();
      loadProducts();
    }

    // ── Delete ──────────────────────────────────────────────────────────────────

    async function deleteProduct(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;

      const res = await fetch("/api/admin-products", {
        method: "DELETE",
        headers: { "Content-Type": "application/json", "x-admin-password": currentPassword },
        body: JSON.stringify({ id })
      });

      if (!res.ok) {
        alert("Could not delete product.");
        return;
      }
      loadProducts();
    }

    // ── Edit helpers ─────────────────────────────────────────────────────────────

    function editProduct(p) {
      editingId = p.id;
      document.getElementById("f_id").value = p.id;
      document.getElementById("f_id").disabled = true;
      document.getElementById("f_name").value = p.name;
      document.getElementById("f_price").value = p.price;
      document.getElementById("f_description").value = p.description || "";
      document.getElementById("f_image").value = p.image || "";
      const extras = (p.images || []).filter(img => img !== p.image);
      document.getElementById("f_images").value = extras.join("\n");
      document.getElementById("formTitle").textContent = "Edit Product";
      document.getElementById("cancelEditBtn").classList.remove("hidden");
      document.getElementById("formMsg").classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelEdit() {
      clearForm();
    }

    function clearForm() {
      editingId = null;
      ["f_id", "f_name", "f_price", "f_description", "f_image", "f_images"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("f_id").disabled = false;
      document.getElementById("formTitle").textContent = "Add New Product";
      document.getElementById("cancelEditBtn").classList.add("hidden");
      resetDropZone();
    }

    // ── Utilities ────────────────────────────────────────────────────────────────

    function showFormMsg(msg, color) {
      const el = document.getElementById("formMsg");
      el.textContent = msg;
      el.className = `text-sm mt-4 text-${color}-400`;
      el.classList.remove("hidden");
      setTimeout(() => el.classList.add("hidden"), 4000);
    }

    function escHtml(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Image Upload ─────────────────────────────────────────────────────────────

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById("dropZone").classList.add("drag-over");
    }

    function handleDragLeave(e) {
      document.getElementById("dropZone").classList.remove("drag-over");
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById("dropZone").classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) uploadFile(file);
    }

    let _supabaseClient = null;

    async function getSupabaseClient() {
      if (_supabaseClient) return _supabaseClient;
      const res = await fetch("/api/upload-image", {
        headers: { "x-admin-password": currentPassword }
      });
      if (!res.ok) throw new Error("Could not get upload config.");
      const { supabaseUrl, supabaseAnonKey } = await res.json();
      _supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
      return _supabaseClient;
    }

    async function uploadFile(file) {
      if (!file.type.startsWith("image/")) {
        showFormMsg("Please select an image file.", "red");
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showFormMsg("Image must be under 10 MB.", "red");
        return;
      }

      const zone = document.getElementById("dropZone");
      const progress = document.getElementById("uploadProgress");
      const bar = document.getElementById("uploadBar");
      document.getElementById("dropZoneContent").classList.add("hidden");
      progress.classList.remove("hidden");
      zone.classList.remove("uploaded");

      let pct = 0;
      const ticker = setInterval(() => {
        pct = Math.min(pct + 8, 85);
        bar.style.width = pct + "%";
      }, 120);

      let sb, url;
      try {
        sb = await getSupabaseClient();
      } catch (e) {
        clearInterval(ticker);
        showFormMsg(e.message || "Upload setup failed.", "red");
        resetDropZone();
        return;
      }

      const ext = file.name.split(".").pop().toLowerCase().replace(/[^a-z0-9]/g, "") || "jpg";
      const path = `product-${Date.now()}.${ext}`;

      const { error } = await sb.storage.from("productimages").upload(path, file, { contentType: file.type, upsert: false });
      clearInterval(ticker);

      if (error) {
        showFormMsg("Upload failed: " + error.message + " | " + (error.error || "") + " | status: " + (error.statusCode || ""), "red");
        resetDropZone();
        return;
      }

      const { data } = sb.storage.from("productimages").getPublicUrl(path);
      url = data.publicUrl;
      bar.style.width = "100%";

      setTimeout(() => {
        progress.classList.add("hidden");
        document.getElementById("dropZoneContent").classList.remove("hidden");
        zone.classList.add("uploaded");
        // Show thumbnail in the drop zone
        zone.querySelector("#dropZoneContent").innerHTML = `
          <img src="${escHtml(url)}" class="w-20 h-20 object-cover rounded mx-auto mb-2">
          <p class="text-green-400 text-xs">Uploaded! <span class="text-gray-500 underline cursor-pointer" onclick="resetDropZone()">Change</span></p>
        `;
        document.getElementById("f_image").value = url;
        updateImagePreview();
      }, 300);
    }

    function resetDropZone() {
      const zone = document.getElementById("dropZone");
      zone.classList.remove("uploaded", "drag-over");
      document.getElementById("uploadProgress").classList.add("hidden");
      document.getElementById("uploadBar").style.width = "0%";
      document.getElementById("dropZoneContent").classList.remove("hidden");
      document.getElementById("dropZoneContent").innerHTML = `
        <p class="text-gray-400 text-sm">Drop image here or <span class="underline cursor-pointer">click to browse</span></p>
        <p class="text-gray-600 text-xs mt-1">JPG, PNG, WebP — max 5 MB</p>
      `;
      document.getElementById("fileInput").value = "";
    }

    function updateImagePreview() {
      const url = document.getElementById("f_image").value.trim();
      const preview = document.getElementById("imagePreview");
      if (url) {
        preview.src = url;
        preview.classList.remove("hidden");
      } else {
        preview.classList.add("hidden");
      }
    }
  </script>

</body>
</html>
