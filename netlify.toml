m[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Clean product URLs: /product/maradona-jersey -> product.html?id=maradona-jersey
# (page.html -> /page for shop, about, cart, etc. is handled automatically by Netlify)
[[redirects]]
  from = "/product/:id"
  to = "/product.html?id=:id"
  status = 200
